name: Handle New Suggestion

on:
  repository_dispatch:
    types: [new_suggestion]

jobs:
  handle_suggestion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log suggestion
        run: |
          echo "Nouvelle suggestion reçue : ${{ github.event.client_payload }}" >> suggestions.log
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add suggestions.log
          git commit -m "Nouvelle suggestion : ${{ github.event.client_payload.type }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
