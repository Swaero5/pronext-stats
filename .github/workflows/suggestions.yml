name: Handle New Suggestion

on:
  repository_dispatch:
    types: [new_suggestion]

jobs:
  handle_suggestion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Append suggestion to file
        run: |
          echo "${{ github.event.client_payload }}" >> suggestions.json
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add suggestions.json
          git commit -m "Nouvelle suggestion : ${{ github.event.client_payload.type }}"
          git push
