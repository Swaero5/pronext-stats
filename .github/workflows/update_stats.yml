name: Update Stats
on:
  repository_dispatch:
    types: [app_usage]
jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          token: ${{ secrets.TOKEN }}
      - name: Update stats
        run: |
          DATE="${{ github.event.client_payload.date }}"
          USER_ID="${{ github.event.client_payload.user_id }}"
          CITY="${{ github.event.client_payload.city }}"
          REGION="${{ github.event.client_payload.region }}"
          TOTAL_AI_CREDITS="${{ github.event.client_payload.total_ai_credits }}"
          WEEKLY_AI_CREDITS="${{ github.event.client_payload.weekly_ai_credits }}"
          MONTHLY_AI_CREDITS="${{ github.event.client_payload.monthly_ai_credits }}"
          FILE="stats.json"

          echo "Date: $DATE | User: $USER_ID"
          echo "City: $CITY | Region: $REGION"
          echo "Credits — total: $TOTAL_AI_CREDITS | weekly: $WEEKLY_AI_CREDITS | monthly: $MONTHLY_AI_CREDITS"

          USER_OBJ=$(jq -n \
            --arg city "$CITY" \
            --arg region "$REGION" \
            --argjson total "$TOTAL_AI_CREDITS" \
            --argjson weekly "$WEEKLY_AI_CREDITS" \
            --argjson monthly "$MONTHLY_AI_CREDITS" \
            '{city: $city, region: $region, total_ai_credits: $total, weekly_ai_credits: $weekly, monthly_ai_credits: $monthly}')

          if [ ! -f "$FILE" ]; then
            echo "Fichier $FILE non trouvé, création..."
            jq -n --arg date "$DATE" --arg uid "$USER_ID" --argjson obj "$USER_OBJ" \
              '{($date): {($uid): $obj}}' > $FILE
          else
            echo "Fichier $FILE trouvé, mise à jour..."
            jq --arg date "$DATE" --arg uid "$USER_ID" --argjson obj "$USER_OBJ" \
              '.[$date] //= {} | .[$date][$uid] = $obj' \
              $FILE > temp.json && mv temp.json $FILE
          fi

          echo "Contenu mis à jour du fichier $FILE:"
          cat $FILE
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add stats.json
          git commit -m "Mise à jour des statistiques pour ${{ github.event.client_payload.date }}"
          git push origin main
        env:
          TOKEN: ${{ secrets.TOKEN }}
